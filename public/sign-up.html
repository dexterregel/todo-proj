<!DOCTYPE html>
<html lang="en">
<head>
    <title>To-dos</title>
    <link rel="stylesheet" href="css/sign-up.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <a href="index.html">< Back</a>
        <h1>Sign up</h1>
    </header>
    <form id="sign-up" class="sign-up">
        <div class="field-container">
            <label for="email">Email:</label>
            <input id="email" name="email" type="email" required>
        </div>

        <div class="field-container">
            <label for="username">Username:</label>
            <input id="username" name="username" type="text" required>
        </div>

        <div class="field-container">
            <label for="password">Password:</label>
            <input id="password" name="password" type="password" required>
            
            <div class="show-password-container">
                <input id="show-password" type="checkbox" data-show-password="show-password">
                <label for="show-password">Show password</label>
            </div>
        </div>

        <div id="confirm-password-container">
            <label for="confirm-password">Confirm password:</label>
            <input id="confirm-password" name="confirm-password" type="password" required>

            <div class="show-password-container">
                <input id="show-password" type="checkbox" data-show-password="show-confirm-password">
                <label for="show-password">Show password</label>
            </div>
            <p id="error"></p>
        </div>

        <button id="sign-up-btn" type="submit" disabled>Sign up</button>
    </form>
    <script src="js/sign-up.js" type="module"></script>
</body>
</html>
